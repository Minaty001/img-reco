<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vision Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- ============================================
         Main Container
         ============================================ -->
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>Vision Assistant</h1>
            <span class="subtitle">Capture &amp; Recognize Objects</span>
        </header>

        <!-- ============================================
             Camera / Capture Section
             ============================================ -->
        <div class="camera-section">
            <div class="video-wrapper" id="videoWrapper">
                <!-- Live camera preview -->
                <video id="video" autoplay playsinline muted></video>
                <!-- Hidden canvas for frame capture -->
                <canvas id="canvas" style="display:none;"></canvas>
                <!-- Captured photo overlay (shown after capture) -->
                <img id="capturedImg" class="captured-img hidden" alt="Captured photo">
                <!-- Loading spinner (shown while detecting) -->
                <div id="spinner" class="spinner hidden">
                    <div class="spinner-ring"></div>
                    <span class="spinner-text">Detecting...</span>
                </div>
                <!-- Overlay text when camera is off -->
                <div class="video-overlay" id="videoOverlay">
                    <div class="overlay-icon">📷</div>
                    <span>Tap "Open Camera" to start</span>
                </div>
            </div>
        </div>

        <!-- ============================================
             Controls Section
             ============================================ -->
        <div class="controls">
            <button id="openCameraBtn" class="btn btn-secondary">
                <span class="btn-icon">📷</span> Open Camera
            </button>
            <button id="captureBtn" class="btn btn-capture" disabled>
                <span class="btn-icon">📸</span> Capture &amp; Detect
            </button>
            <button id="retakeBtn" class="btn btn-outline hidden">
                <span class="btn-icon">🔄</span> Capture Again
            </button>
            <button id="closeCameraBtn" class="btn btn-danger hidden">
                <span class="btn-icon">✕</span> Close Camera
            </button>
            <button id="toggleLang" class="btn btn-ghost">
                <span class="btn-icon">🌐</span> <span id="langLabel">English</span>
            </button>
        </div>

        <!-- ============================================
             Status Indicator
             ============================================ -->
        <div class="status-bar" id="statusBar">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Ready</span>
        </div>

        <!-- ============================================
             Detected Objects Panel
             ============================================ -->
        <div class="panel" id="objectsPanel">
            <div class="panel-header">
                <h2>Detected Objects</h2>
                <span class="badge" id="objectCount">0</span>
            </div>
            <div class="panel-body" id="objectsList">
                <div class="empty-state">Capture a photo to detect objects.</div>
            </div>
        </div>

        <!-- ============================================
             Last Detection Summary
             ============================================ -->
        <div class="panel">
            <div class="panel-header">
                <h2>Last Detection</h2>
            </div>
            <div class="panel-body history-grid">
                <div class="history-item">
                    <label>Objects Found</label>
                    <span id="currentObjects">-</span>
                </div>
                <div class="history-item">
                    <label>Last Spoken</label>
                    <span id="lastSpoken">-</span>
                </div>
            </div>
        </div>

        <!-- ============================================
             Spoken Message Display
             ============================================ -->
        <div class="speech-box" id="speechBox">
            <div class="speech-label">🗣️ Voice Output</div>
            <div class="speech-text" id="speechText">Capture a photo to hear the description.</div>
        </div>

        <!-- ============================================
             Footer
             ============================================ -->
        <footer class="footer">
            <span>Vision Assistant v2.0</span>
            <span>Capture → Detect → Speak</span>
        </footer>
    </div>

    <!-- ============================================
         Scripts
         ============================================ -->
    <script src="/static/script.js"></script>
</body>
</html>
